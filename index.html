<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Bayna Yadayk Deel 2 — Examen-Sprint</title>
<style>
  :root{
    --bg:#0f1419; --card:#1a212b; --card2:#222c38; --ink:#eef2f6; --mut:#9fb0c0;
    --acc:#39b88a; --acc2:#2d8f6b; --gold:#e0a93e; --red:#e06a5a; --line:#2c3744; --blue:#5aa9e0;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:16px;line-height:1.6;padding-bottom:78px}
  .ar{font-family:"Geeza Pro","Noto Naskh Arabic","Scheherazade New","Traditional Arabic",serif;direction:rtl}
  header{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,#121922,#0f1419);border-bottom:1px solid var(--line);padding:12px 16px}
  header .hwrap{display:flex;justify-content:space-between;align-items:center;gap:10px}
  header h1{margin:0;font-size:17px;font-weight:700}
  header .sub{color:var(--mut);font-size:12px;margin-top:2px}
  .txtsize{display:flex;gap:6px;flex-shrink:0}
  .txtsize button{background:var(--card2);border:1px solid var(--line);color:var(--ink);font-weight:700;font-size:16px;padding:7px 12px;border-radius:9px;min-width:42px}
  .txtsize button:active{transform:translateY(1px)}
  main{padding:16px;max-width:760px;margin:0 auto}
  h2{font-size:18px;margin:4px 0 12px}
  h3{font-size:15px;margin:18px 0 8px;color:var(--gold)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin:0 0 12px}
  .mut{color:var(--mut)}
  .pill{display:inline-block;background:var(--card2);border:1px solid var(--line);border-radius:999px;padding:4px 10px;font-size:12px;margin:0 6px 6px 0}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:10px}
  .btn{background:var(--acc);color:#06231a;font-weight:700;padding:11px 16px;font-size:14px}
  .btn:active{transform:translateY(1px)}
  .btn.sec{background:var(--card2);color:var(--ink);border:1px solid var(--line)}
  .btn.gold{background:var(--gold);color:#2a1d04}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  /* nav */
  nav{position:fixed;bottom:0;left:0;right:0;z-index:40;background:#121922;border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:6px 2px 8px}
  nav button{background:none;color:var(--mut);font-size:10px;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 4px;flex:1}
  nav button .ic{font-size:19px}
  nav button.on{color:var(--acc)}
  .hidden{display:none!important}
  /* plan */
  .plan-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}
  .plan-item:last-child{border-bottom:none}
  .plan-tijd{min-width:88px;font-variant-numeric:tabular-nums;color:var(--gold);font-weight:700;font-size:13px}
  .plan-blok{font-weight:700;font-size:14px}
  .plan-wat{color:var(--mut);font-size:13px;margin-top:2px}
  /* flashcard */
  .fc{perspective:1200px;margin:10px 0}
  .fc-inner{position:relative;min-height:200px;transition:transform .45s;transform-style:preserve-3d}
  .fc.flip .fc-inner{transform:rotateY(180deg)}
  .fc-face{position:absolute;inset:0;backface-visibility:hidden;background:var(--card2);border:1px solid var(--line);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;text-align:center}
  .fc-back{transform:rotateY(180deg)}
  .fc-ar{font-size:40px;font-weight:700}
  .fc-tr{color:var(--blue);font-size:15px;margin-top:8px}
  .fc-nl{font-size:22px;font-weight:700}
  .fc-ex{margin-top:14px;font-size:17px}
  .fc-exnl{color:var(--mut);font-size:13px;margin-top:4px}
  .counter{color:var(--mut);font-size:13px;text-align:center;margin:6px 0}
  .progress{height:6px;background:var(--card2);border-radius:99px;overflow:hidden;margin:4px 0 10px}
  .progress > i{display:block;height:100%;background:var(--acc);width:0}
  /* quiz */
  .opt{display:block;width:100%;text-align:right;background:var(--card2);border:1px solid var(--line);color:var(--ink);padding:14px;border-radius:12px;margin:8px 0;font-size:23px}
  .opt.good{background:#16432f;border-color:var(--acc)}
  .opt.bad{background:#451f1a;border-color:var(--red)}
  input[type=text]{width:100%;background:var(--card2);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:12px;font-size:22px}
  textarea{width:100%;min-height:120px;background:var(--card2);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:12px;font-size:20px;line-height:1.9}
  .verdict{font-weight:700;margin-top:10px}
  .ok{color:var(--acc)} .no{color:var(--red)}
  .model-ar{font-size:24px;line-height:2;background:#142b22;border:1px solid var(--acc2);border-radius:12px;padding:14px;margin-top:8px}
  .model-nl{color:var(--mut);font-size:14px;margin-top:8px}
  .grid2{display:grid;grid-template-columns:1fr;gap:8px}
  table{width:100%;border-collapse:collapse}
  td{padding:8px 6px;border-bottom:1px solid var(--line);vertical-align:top;font-size:14px}
  td.a{font-size:24px;white-space:nowrap}
  .chip{font-size:12px;background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:6px 9px;display:inline-block;margin:3px 4px 3px 0}
  .selUnit{display:flex;gap:6px;overflow-x:auto;padding:4px 0 10px;-webkit-overflow-scrolling:touch}
  .selUnit button{white-space:nowrap;background:var(--card2);border:1px solid var(--line);color:var(--ink);padding:9px 12px;font-size:13px;border-radius:999px}
  .selUnit button.on{background:var(--acc);color:#06231a;font-weight:700}
  .tip{font-size:13px;color:var(--mut);background:var(--card2);border-left:3px solid var(--gold);border-radius:8px;padding:10px;margin:8px 0}
  .good-ex{color:var(--acc)} .bad-ex{color:var(--red);text-decoration:line-through}
</style>
</head>
<body>
<header>
  <div class="hwrap">
    <div>
      <h1>🕌 Bayna Yadayk — Deel 2 · Examen-Sprint</h1>
      <div class="sub">Boek 1 · schrijftoets · interactieve leer-app</div>
    </div>
    <div class="txtsize">
      <button onclick="bumpScale(-1)" aria-label="tekst kleiner">A−</button>
      <button onclick="bumpScale(1)" aria-label="tekst groter">A+</button>
    </div>
  </div>
</header>
<main id="view"></main>

<nav>
  <button data-tab="plan" class="on"><span class="ic">🏁</span>Plan</button>
  <button data-tab="diag"><span class="ic">🩺</span>Diagnose</button>
  <button data-tab="woorden"><span class="ic">📚</span>Woorden</button>
  <button data-tab="motor"><span class="ic">✍️</span>Schrijf</button>
  <button data-tab="grammatica"><span class="ic">📐</span>Gram</button>
  <button data-tab="vervoeg"><span class="ic">🔁</span>Vervoeg</button>
  <button data-tab="spelling"><span class="ic">🔤</span>Spelling</button>
  <button data-tab="quiz"><span class="ic">🧠</span>Quiz</button>
  <button data-tab="train"><span class="ic">🖊️</span>Train</button>
</nav>

<script>
const DATA = {"plan": [{"tijd": "0:00 – 0:10", "blok": "Diagnose Deel 1", "wat": "Doe de Deel 1-diagnosetest (20 woorden) — snel, om te zien welke thema's zwak zijn."}, {"tijd": "0:10 – 0:25", "blok": "Schrijfmotor + Spelling lezen", "wat": "Lees de tabs Schrijfmotor en Spelling 1x door. Zinspatronen + 8 spellingvallen = de breedste puntenwinst."}, {"tijd": "0:25 – 0:55", "blok": "Verleden tijd vervoegen", "wat": "Tab Vervoeg: leer de 13 achtervoegsels, doe 'Oefenen (typen)' tot 80%+ en 'Herkennen' voor de overhoring. Bekijk ook de bonus toekomende tijd (سـ)."}, {"tijd": "0:55 – 2:10", "blok": "Grammatica-stencils (9 onderwerpen)", "wat": "Tab Gram: per onderwerp theorie lezen + mini-quiz doen (~8 min elk). Dit is exact de stof van je docent: woordsoorten, naamwoordzin, nkr/معرفة, zon/maanletters, tanwin, aanwijswoorden, vraagwoorden, mv, tijd/plaats."}, {"tijd": "2:10 – 2:20", "blok": "Pauze", "wat": "Sta op, drink water, loop. Je brein zet kennis vast tijdens rust."}, {"tijd": "2:20 – 3:05", "blok": "Woorden Deel 2", "wat": "Tab Woorden: per thema kaarten flippen + quiz. Focus op de zwakke thema's uit je diagnose. Markeer foute woorden als 'nog leren'."}, {"tijd": "3:05 – 3:45", "blok": "Schrijftraining", "wat": "Het echte examenwerk. Tab Train: schrijf ZELF 5-6 zinnen met de gegeven woorden, vergelijk met het modelverhaal. Gebruik verleden tijd + tijd/plaats-bijwoorden. Let op spelling (ة، hamza، tanwin)."}, {"tijd": "3:45 – 4:00", "blok": "Laatste check", "wat": "Herhaal foute woorden (quiz 'alleen nog-leren') en lees je 8 modelverhalen nog 1x. Ken van elk thema 1 openingszin + 3 kernwoorden. Klaar."}], "schrijfmotor": [{"titel": "Open je verhaal (plaatje beschrijven)", "rijen": [["هَذِهِ صُورَةٌ عَنْ...", "hādhihi ṣūratun ʿan...", "Dit is een foto over..."], ["فِي الصُّورَةِ...", "fī aṣ-ṣūrah...", "Op de foto..."], ["أَرَى فِي الصُّورَةِ...", "arā fī aṣ-ṣūrah...", "Ik zie op de foto..."], ["هَذَا / هَذِهِ ...", "hādhā / hādhihi", "Dit is een ... (m / v)"]]}, {"titel": "Tijd & volgorde (laat een verhaal lopen)", "rijen": [["فِي الصَّبَاحِ / فِي المَسَاءِ", "fī aṣ-ṣabāḥ / fī al-masāʾ", "'s ochtends / 's avonds"], ["يَوْمَ الجُمُعَةِ", "yawma al-jumuʿah", "op vrijdag"], ["أَوَّلًا ... ثُمَّ ... بَعْدَ ذَلِكَ ... أَخِيرًا", "awwalan... thumma... baʿda dhālik... akhīran", "eerst... daarna... vervolgens... ten slotte"], ["كُلَّ يَوْمٍ", "kulla yawm", "elke dag"]]}, {"titel": "Verleden tijd (vertel wat gebeurde)", "rijen": [["ذَهَبْتُ إِلَى...", "dhahabtu ilā...", "ik ging naar..."], ["رَأَيْتُ...", "raʾaytu...", "ik zag..."], ["اِشْتَرَيْتُ / أَكَلْتُ / رَكِبْتُ", "ishtaraytu / akaltu / rakibtu", "ik kocht / at / stapte in"], ["زُرْتُ... / سَافَرْتُ إِلَى...", "zurtu... / sāfartu ilā...", "ik bezocht... / ik reisde naar..."]]}, {"titel": "Willen, houden van, omdat (geef reden/gevoel)", "rijen": [["أُرِيدُ أَنْ + werkwoord", "urīdu an...", "ik wil ... (bv. أُرِيدُ أَنْ أَشْتَرِيَ = ik wil kopen)"], ["أُحِبُّ + zelfstandig naamwoord", "uḥibbu...", "ik hou van..."], ["لِأَنَّ ...", "li-anna...", "omdat..."], ["لِ + werkwoord", "li-...", "om te ... (bv. ذَهَبْتُ لِأَشْتَرِيَ = ik ging om te kopen)"]]}, {"titel": "Beschrijven (naamwoordzin & كان)", "rijen": [["الجَوُّ حَارٌّ. / البَيْتُ كَبِيرٌ.", "al-jawwu ḥārr / al-baytu kabīr", "Het weer is warm. / Het huis is groot. (geen 'is'-werkwoord!)"], ["هَذَا قَمِيصٌ جَمِيلٌ.", "hādhā qamīṣun jamīl", "Dit is een mooi overhemd."], ["كَانَ الجَوُّ بَارِدًا.", "kāna al-jawwu bāridan", "Het weer wás koud. (na كان → naṣb/tanwin -an)"], ["عِنْدِي... / مَعِي...", "ʿindī... / maʿī...", "ik heb... / ik heb bij me..."]]}, {"titel": "Sluit je verhaal af", "rijen": [["كَانَ يَوْمًا جَمِيلًا.", "kāna yawman jamīlan", "Het was een mooie dag."], ["كَانَتْ رِحْلَةً مُمْتِعَةً.", "kānat riḥlatan mumtiʿah", "Het was een leuke reis."], ["اِسْتَمْتَعْتُ كَثِيرًا.", "istamtaʿtu kathīran", "Ik heb erg genoten."], ["الحَمْدُ لِلَّهِ.", "al-ḥamdu lillāh", "Alle lof zij Allah."]]}], "spelling": [{"titel": "ة (taa marbuta) of ه?", "regel": "ة heeft twee puntjes en hoort bij vrouwelijke woorden. Ze staat ALLEEN aan het eind en je hoort een korte -a. Schrijf daar nooit een gewone ه (h).", "goed": "مَدْرَسَة، سَيَّارَة، رِحْلَة", "fout": "مدرسه، سياره"}, {"titel": "De hamza: أ / إ / آ", "regel": "De hamza zit vaak op een alif. أ = hamza erbóven, klinkt als a of u (أَكَلَ، أُرِيد). إ = hamza erónder, klinkt als i (إِلَى). آ = lange aa (آمَنَ). Vergeet de hamza niet te schrijven.", "goed": "أَب، إِسْلَام، أُرِيد", "fout": "اب، اسلام"}, {"titel": "ى of ي aan het eind?", "regel": "Een paar woorden eindigen op ى: dat lijkt op de ي, maar heeft GEEN puntjes en klinkt als een lange -aa. Onthoud vooral: إلى، على، مستشفى.", "goed": "إِلَى، عَلَى، مُسْتَشْفَى", "fout": "الي، علي، مستشفي"}, {"titel": "De -an-klank schrijven: ـًا", "regel": "Hoor je -an aan het eind (bv. bij een lijdend voorwerp of na كان)? Schrijf dan ـً, meestal met een losse alif erachter: قَمِيصًا. De 'n' schrijf je NIET als ن. Géén losse alif na ة، ى، أ، اء.", "goed": "اِشْتَرَيْتُ قَمِيصًا، كَانَ بَارِدًا", "fout": "اشتريت قميص (de -an vergeten)"}, {"titel": "الـ vóór zon- of maanletter", "regel": "Je schrijft الـ altijd hetzelfde, maar de UITSPRAAK verschilt. Vóór een zonletter (ت ث د ذ ر ز س ش ص ض ط ظ ل ن) hoor je de ل niet en verdubbel je de volgende letter: الشَّمْس = ash-shams. Vóór een maanletter spreek je الـ gewoon uit: القَمَر = al-qamar.", "goed": "الشَّمْس (ash-shams)، النَّاس (an-nās)", "fout": "‘al-shams’ zeggen (moet zijn: ash-shams)"}, {"titel": "Begin-alif zonder hamza (اسم، ابن)", "regel": "Woorden als اسم، ابن، اشترى beginnen met een alif ZONDER hamza-teken. Aan het begin zeg je 'i' (ism), maar je schrijft géén hamza eronder.", "goed": "اِسْمِي أَحْمَد، اِشْتَرَيْت", "fout": "إسمي (hamza eronder is hier fout)"}, {"titel": "Bezit (idafa): 1e woord zonder tanwin/الـ", "regel": "Bij 'de … van de …' krijgt het EERSTE woord geen tanwin én geen الـ. Het tweede woord heeft vaak wel الـ.", "goed": "بَابُ البَيْتِ (de deur van het huis)، حَقِيبَةُ السَّفَرِ (de reiskoffer)", "fout": "بابٌ البيتِ (tanwin op het eerste woord is fout)"}, {"titel": "Vrouwelijk: werkwoord + ـتْ, bn + ة", "regel": "Is het onderwerp vrouwelijk? Dan eindigt het werkwoord (verleden tijd) op ـتْ en het bijvoeglijk naamwoord op ة. Laat onderwerp en gezegde bij elkaar passen.", "goed": "ذَهَبَتْ فَاطِمَة، السَّيَّارَةُ جَمِيلَة", "fout": "ذهب فاطمة، السيارة جميل"}], "modellen": [{"unit": 9, "thema": "Winkelen — التَّسَوُّق", "emoji": "🛍️", "opdracht": "Schrijf een verhaaltje (5-6 zinnen) over een dag op de markt. Gebruik de woorden:", "woorden": ["السُّوق (markt)", "قَمِيص (overhemd)", "ثَمَن (prijs)", "أَبْيَض (wit)", "خَمْسُونَ (vijftig)", "البَائِع (verkoper)"], "model_ar": "ذَهَبْتُ إِلَى السُّوقِ يَوْمَ الجُمُعَةِ. أَرَدْتُ أَنْ أَشْتَرِيَ قَمِيصًا. رَأَيْتُ قَمِيصًا أَبْيَضَ وَقَمِيصًا أَحْمَرَ. سَأَلْتُ البَائِعَ: كَمْ ثَمَنُ هَذَا القَمِيصِ؟ قَالَ: خَمْسُونَ رِيَالًا. اِشْتَرَيْتُ القَمِيصَ الأَبْيَضَ. كَانَ رَخِيصًا وَجَمِيلًا.", "model_nl": "Ik ging vrijdag naar de markt. Ik wilde een overhemd kopen. Ik zag een wit en een rood overhemd. Ik vroeg de verkoper: hoeveel kost dit overhemd? Hij zei: vijftig riyal. Ik kocht het witte overhemd. Het was goedkoop en mooi."}, {"unit": 10, "thema": "Het weer — الجَوّ", "emoji": "🌤️", "opdracht": "Beschrijf het weer in de vier seizoenen. Gebruik de woorden:", "woorden": ["الجَوّ (weer)", "حَارّ (warm)", "بَارِد (koud)", "الصَّيْف (zomer)", "الشِّتَاء (winter)", "تُمْطِر (het regent)"], "model_ar": "الجَوُّ اليَوْمَ جَمِيلٌ. الشَّمْسُ مُشْرِقَةٌ وَالسَّمَاءُ زَرْقَاءُ. فِي الصَّيْفِ الجَوُّ حَارٌّ، وَفِي الشِّتَاءِ الجَوُّ بَارِدٌ وَتُمْطِرُ السَّمَاءُ. فِي الخَرِيفِ تَهُبُّ الرِّيَاحُ. أُحِبُّ الرَّبِيعَ لِأَنَّ الجَوَّ مُعْتَدِلٌ.", "model_nl": "Het weer is vandaag mooi. De zon schijnt en de lucht is blauw. In de zomer is het warm, en in de winter is het koud en regent het. In de herfst waait de wind. Ik hou van de lente omdat het weer mild is."}, {"unit": 11, "thema": "Mensen & plaatsen — النَّاس وَالأَمَاكِن", "emoji": "🏙️", "opdracht": "Beschrijf jouw stad en wie er werkt. Gebruik de woorden:", "woorden": ["مَدِينَة (stad)", "مَسْجِد (moskee)", "مُسْتَشْفَى (ziekenhuis)", "طَبِيب (dokter)", "مُعَلِّمَة (lerares)", "قَرِيب (dichtbij)"], "model_ar": "أَنَا أَسْكُنُ فِي مَدِينَةٍ كَبِيرَةٍ. فِي مَدِينَتِي مَسْجِدٌ وَمُسْتَشْفًى وَمَدْرَسَةٌ. أَبِي طَبِيبٌ يَعْمَلُ فِي المُسْتَشْفَى. أُمِّي مُعَلِّمَةٌ فِي المَدْرَسَةِ. أَذْهَبُ إِلَى السُّوقِ القَرِيبِ كُلَّ يَوْمٍ. أُحِبُّ مَدِينَتِي كَثِيرًا.", "model_nl": "Ik woon in een grote stad. In mijn stad is een moskee, een ziekenhuis en een school. Mijn vader is dokter en werkt in het ziekenhuis. Mijn moeder is lerares op de school. Ik ga elke dag naar de markt dichtbij. Ik hou veel van mijn stad."}, {"unit": 12, "thema": "Hobby's — الهِوَايَات", "emoji": "⚽", "opdracht": "Vertel over jouw hobby en die van je familie. Gebruik de woorden:", "woorden": ["هِوَايَة (hobby)", "القِرَاءَة (lezen)", "السِّبَاحَة (zwemmen)", "كُرَة القَدَم (voetbal)", "الحَدِيقَة (tuin/park)", "المُفَضَّلَة (favoriet)"], "model_ar": "هِوَايَتِي المُفَضَّلَةُ هِيَ القِرَاءَةُ. أَقْرَأُ كِتَابًا كُلَّ يَوْمٍ. أَخِي يُحِبُّ كُرَةَ القَدَمِ، وَأُخْتِي تُحِبُّ السِّبَاحَةَ. فِي العُطْلَةِ نَلْعَبُ مَعًا فِي الحَدِيقَةِ. الهِوَايَةُ مُهِمَّةٌ لِلصِّحَّةِ.", "model_nl": "Mijn favoriete hobby is lezen. Ik lees elke dag een boek. Mijn broer houdt van voetbal en mijn zus houdt van zwemmen. In de vakantie spelen we samen in het park. Een hobby is belangrijk voor de gezondheid."}, {"unit": 13, "thema": "Reizen — السَّفَر", "emoji": "✈️", "opdracht": "Beschrijf een reis die je maakte. Gebruik de woorden:", "woorden": ["سَافَرْتُ (ik reisde)", "المَطَار (luchthaven)", "الطَّائِرَة (vliegtuig)", "الحَقِيبَة (koffer)", "الرِّحْلَة (reis)", "مُمْتِعَة (leuk)"], "model_ar": "سَافَرْتُ إِلَى مِصْرَ فِي الصَّيْفِ. ذَهَبْتُ إِلَى المَطَارِ وَحَمَلْتُ حَقِيبَتِي. رَكِبْتُ الطَّائِرَةَ السَّاعَةَ التَّاسِعَةَ. كَانَتِ الرِّحْلَةُ طَوِيلَةً وَلَكِنَّهَا مُمْتِعَةٌ. زُرْتُ الأَهْرَامَ وَأَخَذْتُ صُوَرًا كَثِيرَةً.", "model_nl": "Ik reisde in de zomer naar Egypte. Ik ging naar de luchthaven en droeg mijn koffer. Ik stapte om negen uur in het vliegtuig. De reis was lang maar leuk. Ik bezocht de piramides en maakte veel foto's."}, {"unit": 14, "thema": "Hadj & Umrah — الحَجّ وَالعُمْرَة", "emoji": "🕋", "opdracht": "Beschrijf wat een pelgrim doet tijdens de Hadj. Gebruik de woorden:", "woorden": ["الحَاجّ (pelgrim)", "مَكَّة (Mekka)", "الإِحْرَام (ihram)", "الكَعْبَة (Kaaba)", "طَافَ (hij liep rond)", "عَرَفَة (Arafat)"], "model_ar": "ذَهَبَ الحَاجُّ إِلَى مَكَّةَ لِأَدَاءِ الحَجِّ. لَبِسَ الإِحْرَامَ وَطَافَ حَوْلَ الكَعْبَةِ سَبْعَ مَرَّاتٍ. ثُمَّ سَعَى بَيْنَ الصَّفَا وَالمَرْوَةِ. وَقَفَ بِعَرَفَةَ وَدَعَا اللَّهَ. الحَجُّ رُكْنٌ مِنْ أَرْكَانِ الإِسْلَامِ.", "model_nl": "De pelgrim ging naar Mekka om de Hadj te verrichten. Hij droeg de ihram en liep zeven keer rond de Kaaba. Daarna liep hij tussen Safa en Marwa. Hij stond op Arafat en smeekte tot Allah. De Hadj is een zuil van de Islam."}, {"unit": 15, "thema": "Gezondheid — الصِّحَّة", "emoji": "🩺", "opdracht": "Vertel over een bezoek aan de dokter. Gebruik de woorden:", "woorden": ["الطَّبِيب (dokter)", "مَرِيض (ziek)", "صُدَاع (hoofdpijn)", "حُمَّى (koorts)", "الدَّوَاء (medicijn)", "فَحَصَ (onderzocht)"], "model_ar": "ذَهَبْتُ إِلَى الطَّبِيبِ لِأَنِّي مَرِيضٌ. قُلْتُ لَهُ: عِنْدِي صُدَاعٌ وَحُمَّى. فَحَصَنِي الطَّبِيبُ وَقَالَ: اِشْرَبْ هَذَا الدَّوَاءَ وَنَمْ جَيِّدًا. شَكَرْتُ الطَّبِيبَ. بَعْدَ يَوْمَيْنِ شَعَرْتُ بِتَحَسُّنٍ.", "model_nl": "Ik ging naar de dokter omdat ik ziek was. Ik zei tegen hem: ik heb hoofdpijn en koorts. De dokter onderzocht me en zei: drink dit medicijn en slaap goed. Ik bedankte de dokter. Na twee dagen voelde ik me beter."}, {"unit": 16, "thema": "Vakantie & feest — العُطْلَة", "emoji": "🏖️", "opdracht": "Vertel wat je in de vakantie deed. Gebruik de woorden:", "woorden": ["العُطْلَة (vakantie)", "البَحْر (de zee)", "الشَّاطِئ (strand)", "العِيد (feest)", "زُرْنَا (wij bezochten)", "سَعِيدَة (gelukkig)"], "model_ar": "فِي العُطْلَةِ سَافَرَتْ أُسْرَتِي إِلَى البَحْرِ. سَبَحْنَا وَلَعِبْنَا عَلَى الشَّاطِئِ. فِي العِيدِ زُرْنَا الجَدَّ وَالجَدَّةَ وَأَكَلْنَا طَعَامًا لَذِيذًا. لَعِبَ الأَطْفَالُ كَثِيرًا. كَانَتْ عُطْلَةً سَعِيدَةً.", "model_nl": "In de vakantie reisde mijn familie naar de zee. We zwommen en speelden op het strand. Op het feest bezochten we opa en oma en aten we lekker eten. De kinderen speelden veel. Het was een gelukkige vakantie."}], "vervoegenRegel": {"intro": "In de verleden tijd (الماضي) blijft de stam gelijk en plak je een achtervoegsel achter het werkwoord. Leer deze 13 achtervoegsels — ze zijn voor ELK klankzuiver werkwoord hetzelfde.", "rijen": [["ik", "أَنَا", "ـْتُ", "كَتَبْتُ", "katabtu", "ik schreef"], ["jij (man)", "أَنْتَ", "ـْتَ", "كَتَبْتَ", "katabta", "jij schreef (m)"], ["jij (vrouw)", "أَنْتِ", "ـْتِ", "كَتَبْتِ", "katabti", "jij schreef (v)"], ["hij", "هُوَ", "ـَ", "كَتَبَ", "kataba", "hij schreef"], ["zij (vrouw)", "هِيَ", "ـَتْ", "كَتَبَتْ", "katabat", "zij schreef"], ["wij", "نَحْنُ", "ـْنَا", "كَتَبْنَا", "katabnā", "wij schreven"], ["jullie twee", "أَنْتُمَا", "ـْتُمَا", "كَتَبْتُمَا", "katabtumā", "jullie twee schreven"], ["jullie (m)", "أَنْتُمْ", "ـْتُمْ", "كَتَبْتُمْ", "katabtum", "jullie schreven (m)"], ["jullie (v)", "أَنْتُنَّ", "ـْتُنَّ", "كَتَبْتُنَّ", "katabtunna", "jullie schreven (v)"], ["zij twee (m)", "هُمَا", "ـَا", "كَتَبَا", "katabā", "zij twee schreven (m)"], ["zij twee (v)", "هُمَا", "ـَتَا", "كَتَبَتَا", "katabatā", "zij twee schreven (v)"], ["zij (m, mv)", "هُمْ", "ـُوا", "كَتَبُوا", "katabū", "zij schreven (m)"], ["zij (v, mv)", "هُنَّ", "ـْنَ", "كَتَبْنَ", "katabna", "zij schreven (v)"]], "tip": "Let op de spelling: هم-vorm eindigt op ـُوا met een stille alif (كَتَبُوا). هي = ـَتْ (sukun op de ت). Zwakke werkwoorden (قَالَ، نَامَ، زَارَ) vervoegen anders — die staan hier niet bij; oefen  meestal…", "opts": ["bepaald (معرفة)", "onbepaald (نكرة)"], "a": 1, "u": "Het gezegde is meestal onbepaald, vaak met tanwin (bv. كَبِيرٌ)."}, {"q": "Kies de juiste خبر: الشَّمْسُ ___ (de zon is …)", "opts": ["مُشْرِقَةٌ (schijnend)", "عِبَادَةٌ (aanbidding)"], "a": 0, "u": "الشَّمْسُ مُشْرِقَةٌ = de zon is schijnend. عبادة (aanbidding) past bij الصلاة (het gebed)."}, {"q": "Kies de juiste خبر: العِنَبُ ___ (druiven zijn …)", "opts": ["سَرِيعٌ (snel)", "لَذِيذٌ (lekker)"], "a": 1, "u": "العِنَبُ لَذِيذٌ = druiven zijn lekker. سريع (snel) past bij الحصان (het paard)."}, {"q": "Welke zin is een naamwoordzin (begint met een naamwoord)?", "opts": ["البَيْتُ كَبِيرٌ (het huis is groot)", "ذَهَبَ الوَلَدُ (de jongen ging)"], "a": 0, "u": "البيت كبير begint met het naamwoord البيت → naamwoordzin (جملة اسمية). ذهب begint met een werkwoord → werkwoordzin (جملة فعلية)."}]}, {"key": "marifa", "emoji": "🔖", "nl": "Onbepaald & bepaald", "ar": "النكرة والمعرفة", "intro": "Onbepaald (نكرة) = iets algemeens/onbekends. Bepaald (معرفة) = iets specifieks/bekends.", "theorie": [{"h": "نكرة — onbepaald", "ar": "كِتَابٌ، قَلَمٌ، وَلَدٌ", "nl": "Een (willekeurig) ding. Komt vaak met tanwin (ـٌ ـٍ ـً). Vergelijk NL 'een boek'."}, {"h": "معرفة — bepaald", "ar": "الكِتَابُ، القَلَمُ، الوَلَدُ", "nl": "Een bekend/specifiek ding. Bekendste teken: الـ. Ook bepaald: namen (مُحَمَّد), aanwijswoorden (هذا), voornaamwoorden. Vergelijk NL 'het boek'."}], "quiz": [{"q": "كِتَابٌ is…", "opts": ["نكرة", "معرفة"], "a": 0, "u": "Tanwin, geen الـ → onbepaald."}, {"q": "القَمَرُ is…", "opts": ["نكرة", "معرفة"], "a": 1, "u": "Met الـ → bepaald."}, {"q": "بِنْتٌ is…", "opts": ["نكرة", "معرفة"], "a": 0, "u": "Tanwin → onbepaald."}, {"q": "Maak معرفة van 'كِتَابٌ'", "opts": ["الكِتَابُ", "كِتَابَان"], "a": 0, "u": "Voeg الـ toe en haal de tanwin weg → الكتابُ."}, {"q": "Is een eigennaam zoals 'مُحَمَّد' bepaald?", "opts": ["Ja (معرفة)", "Nee (نكرة)"], "a": 0, "u": "Namen zijn altijd bepaald, ook zonder الـ."}, r": "كِتَاب → كِتَابًا · طَالِب → طَالِبًا", "nl": "Bij de -an-vorm schrijf je meestal een losse alif erachter. Die alif spreek je NIET uit; je zegt gewoon -an (kitāb-an)."}, {"h": "3. Uitzondering: géén losse alif", "ar": "مَدْرَسَةً · فَتًى · مَلْجَأً · مَاءً", "nl": "Geen extra alif als het woord al eindigt op ة (مدرسةً), op ى (فتىً), op أ (ملجأً) of op اء (ماءً). De tanwin komt dan direct op die letter."}], "quiz": [{"q": "Welk soort tanwin: رَجُلٌ ?", "opts": ["ضم (-un)", "كسر (-in)", "فتح (-an)"], "a": 0, "u": "ـٌ = damma-tanwin (-un)."}, {"q": "Welk soort tanwin: طَرِيقًا ?", "opts": ["ضم", "كسر", "فتح"], "a": 2, "u": "ـً met alif = fatha-tanwin (-an)."}, {"q": "Welk soort tanwin: بَيْتٍ ?", "opts": ["ضم", "كسر", "فتح"], "a": 1, "u": "ـٍ = kasra-tanwin (-in)."}, {"q": "Welk woord krijgt GEEN losse alif bij fatha-tanwin?", "opts": ["مَدْرَسَة", "كِتَاب"], "a": 0, "u": "مدرسة eindigt op ة → مدرسةً zonder losse alif."}, {"q": "Verbeter: 'كتابن' (fout gespeld)", "opts": ["كِتَابٌ", "كِتَابن"], "a": 0, "u": "Je schrijft de nun-klank niet als ن, maar als tanwin ـٌ."}, {"q": "Tanwin staat alleen op een…", "opts": ["اسم", "فعل", "حرف"], "a": 0, "u": "Alleen naamwoorden krijgen tanwin."}]}, {"key": "ishara", "emoji": "👉", "nl": "Aanwijswoorden", "ar": "أسماء الإشارة", "intro": "Woorden om iets aan te wijzen. Let op geslacht (m/v), aantal (enk/mv) en afstand (dichtbij/veraf).", "theorie": [{"h": "Dichtbij — للقريب", "ar": "هَذَا (m) · هَذِهِ (v) · هَؤُلَاءِ (mv personen)", "nl": "هذا = deze (m), هذه = deze (v), هؤلاء = deze (meervoud, mensen)."}, {"h": "Veraf — للبعيد", "ar": "ذَلِكَ (m) · تِلْكَ (v) · أُولَئِكَ (mv)", "nl": "ذلك = die (m), تلك = die (v), أولئك = die (meervoud)."}], "quiz": [{"q": "___ كِتَابٌ (m, dichtbij)", "opts": ["هَذَا", "هَذِهِ"], "a": 0, "u": "كتاب is mannelijk → هذا."}, {"q": "___ بِنْتٌ (v, dichtbij)", "opts": ["هَذَا", "هَذِهِ"], "a": 1, "u": "بنت is vrouwelijk → هذه."}, {"q": "___ طُلَّابٌ (mensen, mv, dichtbij)", "opts": ["هَذِهِ", "هَؤُلَاءِ"], "a": 1, "u": "Meervoud mensen → هؤلاء."}, {"q": "___ بَيْتٌ (m, veraf)", "opts": ["ذَلِكَ", "تِلْكَ"], "a": 0, "u": "Mannelijk + veraf → ذلك."}, {"q": "هَذِهِ gebruik je voor…", "opts": ["v enkelvoud", "m enkelvoud"], "a": 0, "u": "هذه = vrouwelijk enkelvoud."}, {"q": "أُولَئِكَ gebruik je voor…", "opts": ["meervoud (veraf)", "enkelvoud (dichtbij)"], "a": 0, "u": "أولئك = die (meervoud, veraf)."}]}, {"key": "istifham", "emoji": "❓", "nl": "Vraagwoorden", "ar": "أدوات الاستفهام", "intro": "Vraagwoorden om informatie te vragen. Leer ze met de Nederlandse betekenis (uit de stencil).", "theorie": [{"h": "Wie / wat / waar", "ar": "مَنْ = wie · مَا/مَاذَا = wat · أَيْنَ = waar", "nl": "مَنْ هَذَا الرَّجُلُ؟ (Wie is deze man?) · مَا هَذَا؟ (Wat is dit?) · أَيْنَ البَيْتُ؟ (Waar is het huis?)"}, {"h": "Wanneer / hoe / hoeveel", "ar": "مَتَى = wanneer · كَيْفَ = hoe · كَمْ = hoeveel", "nl": "مَتَى يَبْدَأُ الدَّرْسُ؟ (Wanneer begint de les?) · كَيْفَ حَالُكَ؟ (Hoe gaat het?) · كَمْ قَلَمًا عِنْدَكَ؟ (Hoeveel pennen heb je?)"}, {"h": "Hoeveel kost het? — بِكَمْ", "ar": "بِكَمْ هَذَا؟ = hoeveel kost dit?", "nl": "بِكَمْ (bikam) = 'voor hoeveel?' → je vraagt naar de PRIJS. بِكَمْ هَذَا الكِتَابُ؟ = Hoeveel kost dit boek? Antwoord bv. بِخَمْسِينَ رِيَالًا (voor vijftig riyal)."}, {"h": "Ja/nee-vraag", "ar": "هَلْ / أَ", "nl": "هَلْ تُحِبُّ العَرَبِيَّةَ؟ (Hou je van Arabisch?) — vraag met ja/nee."}], "quiz": [{"q": "___ اسْمُكَ؟ (Hoe heet je / wat is je naam?)", "opts": ["مَا", "أَيْنَ", "مَتَى"], "a": 0, "u": "Naar een naam/ding vraag je met ما."}, {"q": "___ تَسْكُنُ؟ (Waar woon je?)", "opts": ["أَيْنَ", "كَمْ", "هَلْ"], "a": 0, "u": "Plaats → أين."}, {"q": "___ عُمْرُكَ؟ (Hoe oud ben je?)", "opts": ["كَمْ", "مَنْ", "كَيْفَ"], "a": 0, "u": "Aantal/getal → كم."}, {"q": "___ حَالُكَ؟ (Hoe gaat het?)", "opts": ["كَيْفَ", "مَتَى", "مَا"], "a": 0, "u": "Naar de toestand → كيف."}, {"q": "___ مَوْعِدُ الِامْتِحَانِ؟ (Wanneer is de toets?)", "opts": ["مَتَى", "أَيْنَ", "مَنْ"], "a": 0, "u": "Tijd → متى."}, {"q": "___ هَذَا الرَّجُلُ؟ (Wie is deze man?)", "opts": ["مَنْ", "مَا", "كَمْ"], "a": 0, "u": "Naar een persoon → من."}, {"q": "Je wilt de PRIJS weten: '___ هَذَا القَمِيصُ؟' (hoeveel kost dit overhemd?)", "opts": ["بِكَمْ", "أَيْنَ", "مَتَى"], "a": 0, "u": "بِكَمْ هَذَا؟ = hoeveel kost dit? (بـ + كم = 'voor hoeveel')."}, {"q": "Wat is het verschil? كَمْ vraagt naar het aantal, بِكَمْ naar…", "opts": ["de prijs", "de plaats"], "a": 0, "u": "كَمْ قَلَمًا؟ = hoeveel pennen (aantal). بِكَمْ القَلَمُ؟ = hoeveel kost de pen (prijs)."}]}, {"key": "jam3", "emoji": "🔢", "nl": "Enkel-, twee- & meervoud", "ar": "المفرد والمثنى والجمع", "intro": "Arabisch heeft drie aantallen: enkelvoud (1), tweevoud (precies 2) en meervoud (3+).", "theorie": [{"h": "مفرد — enkelvoud", "ar": "كِتَاب، وَلَد، بِنْت", "nl": "Eén ding."}, {"h": "مثنى — tweevoud", "ar": "كِتَابَانِ، وَلَدَانِ، بِنْتَانِ", "nl": "Precies twee: voeg ـَانِ toe (of ـَيْنِ na voorzetsel/object)."}, {"h": "جمع — meervoud", "ar": "كُتُب، أَوْلَاد، بَنَات، قُصُور", "nl": "Drie of meer. Vaak 'gebroken' meervoud met een nieuwe vorm: كتاب→كُتُب, ولد→أولاد, قصر→قصور."}], "quiz": [{"q": "Tweevoud van كِتَاب", "opts": ["كِتَابَانِ", "كُتُب"], "a": 0, "u": "Tweevoud → ـَانِ: كتابان."}, {"q": "Tweevoud van قَلَم", "opts": ["قَلَمَانِ", "أَقْلَام"], "a": 0, "u": "قلمان = twee pennen."}, {"q": "Welke is enkelvoud (مفرد)?", "opts": ["قَلَم", "أَوْلَاد", "كِتَابَان"], "a": 0, "u": "قلم = één ding. أولاد = mv, كتابان = tweevoud."}, {"q": "Meervoud van بِنْت", "opts": ["بَنَات", "بِنْتَان"], "a": 0, "u": "بنات = meisjes (mv). بنتان = tweevoud."}, {"q": "Meervoud van قَصْر", "opts": ["قُصُور", "قَصْرَان"], "a": 0, "u": "Gebroken meervoud: قصور."}, {"q": "شَجَرَتَانِ is…", "opts": ["مثنى (tweevoud)", "جمع (meervoud)"], "a": 0, "u": "ـَانِ → tweevoud (twee bomen)."}, {"q": "Tweevoud van وَلَد (jongen)", "opts": ["وَلَدَانِ", "أَوْلَاد"], "a": 0, "u": "وَلَدَانِ = twee jongens. أولاد = jongens (3+)."}, {"q": " const $ = (s,el=document)=>el.querySelector(s);
const view = $('#view');
const esc = s => (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

// tekstgrootte (onthouden per gebruiker) — vergroot de hele inhoud uniform
let txtScale = parseFloat(localStorage.getItem('byk2scale'));
if(!txtScale || isNaN(txtScale)) txtScale = 1.15;
function applyScale(){ view.style.zoom = txtScale; }
function bumpScale(d){ txtScale = Math.min(1.6, Math.max(0.85, Math.round((txtScale + d*0.1)*100)/100)); localStorage.setItem('byk2scale', String(txtScale)); applyScale(); }

// verdergaan na antwoord: goed = snel auto-door, fout = wachten op tik 'Volgende'
let __adv=null;
function advNow(){ if(__adv){ const f=__adv; __adv=null; f(); } }

// localStorage helpers (markeer 'nog leren')
const KEY='byk2sprint';
let store = JSON.parse(localStorage.getItem(KEY)||'{}');
if(!store.learn) store.learn={}; // ar -> true (nog leren)
const save=()=>localStorage.setItem(KEY,JSON.stringify(store));
const markLearn=(ar,v)=>{ if(v) store.learn[ar]=1; else delete store.learn[ar]; save(); };

// Arabisch normaliseren voor type-check (negeer harakat & alef-varianten)
function norm(s){
  return (s||'').replace(/[\u064B-\u0652\u0670\u0640]/g,'')
    .replace(/[\u0622\u0623\u0625]/g,'\u0627')
    .replace(/\u0649/g,'\u064A').replace(/\u0629/g,'\u0647')
    .replace(/\s+/g,'').trim();
}

/* ---------- PLAN ---------- */
function renderPlan(){
  let h = '<h2>🏁 Sprintplan (±4 uur)</h2>';
  h += '<div class="card"><b>Slim leren voor de schrijftoets:</b><br><span class="mut">Niet alle woorden stampen. Win punten met (1) zinspatronen die je op elk plaatje plakt, (2) spelling, (3) per thema enkele kernwoorden + 1 modelverhaal. Volg dit schema; heb je meer of minder tijd, schaal de blokken mee.</span></div>';
  h += '<div class="card">';
  DATA.plan.forEach(p=>{
    h+=`<div class="plan-item"><div class="plan-tijd">${esc(p.tijd)}</div><div><div class="plan-blok">${esc(p.blok)}</div><div class="plan-wat">${esc(p.wat)}</div></div></div>`;
  });
  h += '</div>';
  h += '<div class="tip">Tip: zet een timer per blok. Weinig tijd? Sla de Deel 1-woorden over en focus op Schrijfmotor + Spelling + de 8 modelverhalen — daar zitten de meeste punten.</div>';
  view.innerHTML = h;
}

/* ---------- DIAGNOSE (Deel 1) ---------- */
let diagState=null;
function startDiag(){
  // 20 willekeurige Deel 1 woorden, NL->AR meerkeuze
  const all=[]; DATA.units1.forEach(u=>u.terms.forEach(t=>all.push({...t,unit:u.n,theme:u.themeNl})));
  const pick=shuffle(all.slice()).slice(0,20);
  diagState={q:pick,i:0,score:0,wrongThemes:{}};
  renderDiag();
}
function renderDiag(){
  if(!diagState){ view.innerHTML='<h2>🩺 Diagnose Deel 1</h2><div class="card">Snelle test (20 woorden) om te zien of Deel 1 erin zit. Kies bij elke Nederlandse betekenis het juiste Arabische woord.<br><br><button class="btn" onclick="startDiag()">Start diagnose</button></div>'; return; }
  if(diagState.i>=diagState.q.length){ return diagResult(); }
  const cur=diagState.q[diagState.i];
  const opts=buildOpts(cur,DATA.units1,'ar');
  let h=`<h2>🩺 Diagnose Deel 1</h2><div class="counter">Vraag ${diagState.i+1} / ${diagState.q.length} · score ${diagState.score}</div>`;
  h+='<div class="progress"><i style="width:'+(diagState.i/diagState.q.length*100)+'%"></i></div>';
  h+=`<div class="card"><div class="mut">Welk woord betekent:</div><div style="font-size:24px;font-weight:700;margin:6px 0">${esc(cur.nl)}</div>`;
  opts.forEach(o=>{ h+=`<button class="opt ar" onclick="diagAns(this,'${esc(o.ar)}','${esc(cur.ar)}','${esc(cur.theme)}')">${esc(o.ar)}</button>`; });
  h+='<div id="diagVerdict"></div></div>';
  view.innerHTML=h;
}
function diagAns(btn,chosen,correct,theme){
  const good = norm(chosen)===norm(correct);
  document.querySelectorAll('.opt').forEach(b=>{b.style.pointerEvents='none'; if(norm(b.textContent)===norm(correct))b.classList.add('good');});
  __adv=()=>{diagState.i++; renderDiag();};
  if(good){ diagState.score++; setTimeout(advNow,600); }
  else { btn.classList.add('bad'); diagState.wrongThemes[theme]=(diagState.wrongThemes[theme]||0)+1;
    $('#diagVerdict').innerHTML=`<div class="verdict no" style="margin-top:8px">✗ Juist: <span class="ar" style="font-size:24px">${esc(correct)}</span></div><button class="btn" style="margin-top:10px" onclick="advNow()">Volgende ▶</button>`; }
}
function diagResult(){
  const s=diagState.score, t=diagState.q.length, pct=Math.round(s/t*100);
  let advies = pct>=80? 'Deel 1 zit solide. Focus je tijd ~85% op Deel 2.' :
               pct>=55? 'Deel 1 is wankel. Pak eerst de zwakke thema\'s hieronder, daarna Deel 2.' :
               'Deel 1 is flink weggezakt. Begin met de zwakke thema\'s hieronder voordat je Deel 2 doet.';
  let weak=Object.entries(diagState.wrongThemes).sort((a,b)=>b[1]-a[1]);

function startGramQuiz(key){ const t=DATA.grammatica.find(x=>x.key===key); runGramQuiz(t, shuffle(t.quiz.slice())); }
function runGramQuiz(t,qs){ gramState={topic:t,q:qs,i:0,score:0,wrong:[]}; drawGramQuiz(); }
function drawGramQuiz(){
  const st=gramState;
  if(st.i>=st.q.length) return gramResult();
  const c=st.q[st.i];
  let h=`<h2>${esc(st.topic.emoji)} ${esc(st.topic.nl)}</h2><div class="counter">${st.i+1}/${st.q.length} · score ${st.score}</div>`;
  h+='<div class="progress"><i style="width:'+(st.i/st.q.length*100)+'%"></i></div>';
  h+=`<div class="card"><div style="font-size:18px;font-weight:700;margin-bottom:8px" class="ar-mix">${esc(c.q)}</div>`;
  c.opts.forEach((o,idx)=>{ h+=`<button class="opt" style="text-align:center" onclick="gramAns(this,${idx},${c.a})"><span class="ar" style="font-size:23px">${esc(o)}</span></button>`; });
  h+='<div id="gramVerdict"></div></div>';
  view.innerHTML=h;
}
function gramAns(btn,chosen,correct){
  const c=gramState.q[gramState.i];
  document.querySelectorAll('.opt').forEach((b,idx)=>{b.style.pointerEvents='none'; if(idx===correct)b.classList.add('good');});
  const ok=chosen===correct;
  if(ok) gramState.score++; else { btn.classList.add('bad'); gramState.wrong.push(c); }
  __adv=()=>{gramState.i++; drawGramQuiz();};
  $('#gramVerdict').innerHTML=`<div class="verdict ${ok?'ok':'no'}" style="margin-top:10px">${ok?'✓ Goed!':'✗ Fout'} <span class="mut" style="font-weight:400">${esc(c.u)}</span></div>`
    + (ok?'':'<button class="btn" style="margin-top:10px" onclick="advNow()">Volgende ▶</button>');
  if(ok) setTimeout(advNow,1200);
}
function gramResult(){
  const s=gramState.score,t=gramState.q.length,pct=Math.round(s/t*100);
  const nw=gramState.wrong.length;
  let h=`<h2>${esc(gramState.topic.emoji)} ${esc(gramState.topic.nl)} — klaar</h2><div class="card"><div style="font-size:34px;font-weight:800;color:${pct>=80?'var(--acc)':pct>=55?'var(--gold)':'var(--red)'}">${s}/${t} · ${pct}%</div>${nw?`<div class="mut" style="margin-top:6px">${nw} fout — herhaal ze hieronder.</div>`:'<div class="mut" style="margin-top:6px">Alles goed! 🎉</div>'}</div>`;
  h+='<div class="row">';
  if(nw) h+=`<button class="btn gold" onclick="runGramQuiz(gramState.topic, shuffle(gramState.wrong.slice()))">Herhaal de foute (${nw})</button>`;
  h+=`<button class="btn" onclick="startGramQuiz('${gramState.topic.key}')">Opnieuw</button><button class="btn sec" onclick="renderGram('${gramState.topic.key}')">Theorie</button><button class="btn sec" onclick="renderGram()">Ander</button></div>`;
  view.innerHTML=h;
}

let quizState=null;
function renderQuizMenu(){
  const units=DATA.units2;
  let h='<h2>🧠 Quiz · Deel 2</h2><div class="mut" style="margin-bottom:8px">Kies een thema en modus.</div>';
  h+='<div class="selUnit"><button class="'+((quizSel==-1)?'on':'')+'" onclick="setQuizSel(-1)">Alle</button>';
  units.forEach(u=>h+=`<button class="${quizSel===u.n?'on':''}" onclick="setQuizSel(${u.n})">${u.n}. ${esc(u.themeNl)}</button>`);
  h+='</div>';
  const learnCount=Object.keys(store.learn).length;
  h+=`<div class="card"><div class="row"><button class="btn" onclick="startQuiz('mc',false)">Meerkeuze (NL→AR)</button><button class="btn gold" onclick="startQuiz('type',false)">Intypen (NL→AR)</button></div>`;
  h+=`<div class="row" style="margin-top:10px"><button class="btn sec" onclick="startQuiz('mc',true)">Alleen ★ nog-leren (${learnCount})</button></div></div>`;
  h+='<div class="tip">Intypen oefent ook je spelling. Harakat (klinkertekens) hoeven niet exact — de check is mild op tekens, streng op letters.</div>';
  view.innerHTML=h;
}
let quizSel=-1;
function setQuizSel(n){ quizSel=n; renderQuizMenu(); }
function poolFor(onlyLearn){
  let pool=[]; const units=DATA.units2;
  units.forEach(u=>{ if(quizSel!==-1 && u.n!==quizSel) return; u.terms.forEach(t=>pool.push({...t,unit:u.n,theme:u.themeNl})); });
  if(onlyLearn) pool=pool.filter(t=>store.learn[t.ar]);
  return pool;
}
function startQuiz(mode,onlyLearn){
  let pool=poolFor(onlyLearn);
  if(pool.length<4){ alert('Te weinig woorden voor deze selectie (min. 4). Kies een ander thema of markeer eerst woorden.'); return; }
  pool=shuffle(pool).slice(0,Math.min(15,pool.length));
  quizState={mode,q:pool,i:0,score:0};
  renderQuiz();
}
function renderQuiz(){
  if(quizState.i>=quizState.q.length) return quizResult();
  const cur=quizState.q[quizState.i];
  let h=`<h2>🧠 Quiz</h2><div class="counter">${quizState.i+1}/${quizState.q.length} · score ${quizState.score}</div>`;
  h+='<div class="progress"><i style="width:'+(quizState.i/quizState.q.length*100)+'%"></i></div>';
  h+=`<div class="card"><div class="mut">Schrijf/kies het Arabische woord voor:</div><div style="font-size:24px;font-weight:700;margin:6px 0">${esc(cur.nl)}</div>`;
  if(quizState.mode==='mc'){
    const opts=buildOpts(cur,DATA.units2,'ar');
    opts.forEach(o=>h+=`<button class="opt ar" onclick="quizMc(this,'${esc(o.ar)}','${esc(cur.ar)}')">${esc(o.ar)}</button>`);
    h+='<div id="qverdict"></div>';
  } else {
    h+=`<input type="text" id="qin" class="ar" placeholder="schrijf hier..." autocomplete="off" autocorrect="off" spellcheck="false">
        <div class="row" style="margin-top:10px"><button class="btn" onclick="quizType('${esc(cur.ar)}','${esc(cur.tr)}')">Controleer</button><button class="btn sec" onclick="quizSkip('${esc(cur.ar)}','${esc(cur.tr)}')">Weet ik niet</button></div>
        <div id="qverdict"></div>`;
  }
  h+='</div>';
  view.innerHTML=h;
  if(quizState.mode==='type'){ const inp=$('#qin'); if(inp) inp.focus(); }
}
function quizNext(){ quizState.i++; renderQuiz(); }
function quizMc(btn,chosen,correct){
  const good=norm(chosen)===norm(correct);
  document.querySelectorAll('.opt').forEach(b=>{b.style.pointerEvents='none'; if(norm(b.textContent)===norm(correct))b.classList.add('good');});
  __adv=quizNext;
  const v=$('#qverdict');
  if(good){ quizState.score++; v.innerHTML='<div class="verdict ok" style="margin-top:8px">✓ Goed!</div>'; setTimeout(advNow,800); }
  else { btn.classList.add('bad'); markLearn(correct,true);
    v.innerHTML=`<div class="verdict no" style="margin-top:8px">✗ Juist: <span class="ar" style="font-size:24px">${esc(correct)}</span></div><button class="btn" style="margin-top:10px" onclick="advNow()">Volgende ▶</button>`; }
}
function quizType(correct,tr){
  const val=$('#qin').value; const good=norm(val)===norm(correct);
  const v=$('#qverdict'); $('#qin').disabled=true; __adv=quizNext;
  if(good){ quizState.score++; v.innerHTML='<div class="verdict ok">✓ Goed!</div>'; setTimeout(advNow,800); }
  else { markLearn(correct,true);
    v.innerHTML=`<div class="verdict no">✗ Juist is: <span class="ar" style="font-size:24px">${esc(correct)}</span> <span class="mut">(${esc(tr)})</span></div><button class="btn" style="margin-top:10px" onclick="advNow()">Volgende ▶</button>`; }
}
function quizSkip(correct,tr){ markLearn(correct,true); $('#qin').disabled=true; __adv=quizNext; $('#qverdict').innerHTML=`<div class="verdict no">Juist: <span class="ar" style="font-size:24px">${esc(correct)}</span> <span class="mut">(${esc(tr)})</span></div><button class="btn" style="margin-top:10px" onclick="advNow()">Volgende ▶</button>`; }
function quizResult(){
  const s=quizState.score,t=quizState.q.length,pct=Math.round(s/t*100);
  let h=`<h2>🧠 Quiz klaar</h2><div class="card"><div style="font-size:34px;font-weight:800;color:${pct>=80?'var(--acc)':pct>=55?'var(--gold)':'var(--red)'}">${s}/${t} · ${pct}%</div><div class="mut" style="margin-top:6px">Foute woorden zijn automatisch gemarkeerd als ★ nog-leren.</div></div>`;
  h+='<div class="row"><button class="btn" onclick="renderQuizMenu()">Nieuwe quiz</button><button class="btn sec" onclick="go(\'woorden\')">Woorden bekijken</button></div>';
  view.innerHTML=h; quizState=null;
}

/* ---------- SCHRIJFTRAINING ---------- */
function renderTrain(sel){
  const M=DATA.modellen;
  if(sel==null) sel=M[0].unit;
  let h='<h2>🖊️ Schrijftraining (examenvorm)</h2><div class="tip">Lees de opdracht. Schrijf ZELF eerst 5-6 zinnen met de gegeven woorden. Pas daarna: toon het modelverhaal en vergelijk — vooral op spelling en zinsbouw.</div>';
  h+='<div class="selUnit">';
  M.forEach(m=>h+=`<button class="${m.unit===sel?'on':''}" onclick="renderTrain(${m.unit})">${m.emoji} ${m.unit}</button>`);
  h+='</div>';
  const m=M.find(x=>x.unit===sel);
  h+=`<div class="card"><div style="font-size:16px;font-weight:700">${m.emoji} ${esc(m.thema)}</div>
      <div style="margin:10px 0">${esc(m.opdracht)}</div><div>`;
  m.woorden.forEach(w=>h+=`<span class="chip ar" style="font-size:19px">${esc(w)}</span>`);
  h+=`</div></div>`;
  h+=`<div class="card"><div class="mut">Jouw verhaal (typ in het Arabisch):</div>
      <textarea id="myStory" class="ar" placeholder="...اكتب هنا"></textarea>
      <div class="row" style="margin-top:10px"><button class="btn gold" onclick="toggleModel(${sel})">📖 Toon modelverhaal</button></div>
      <div id="modelBox" class="hidden"></div></div>`;
  view.innerHTML=h;
}
function toggleModel(unit){
  const m=DATA.modellen.find(x=>x.unit===unit);
  const box=$('#modelBox');
  if(!box.classList.contains('hidden')){ box.classList.add('hidden'); return; }
  box.classList.remove('hidden');
  box.innerHTML=`<div class="model-ar ar">${esc(m.model_ar)}</div><div class="model-nl">${esc(m.model_nl)}</div>
    <div class="tip" style="margin-top:10px">Vergelijk-checklist: ✓ Begint met tijd/plaats? ✓ Werkwoorden in juiste tijd? ✓ ة en hamza goed? ✓ Tanwin (ـًا) op lijdend voorwerp? ✓ Een afsluitzin?</div>`;
}

/* ---------- helpers ---------- */
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor((i+1)*pseudo()); [a[i],a[j]]=[a[j],a[i]]; } return a; }
let _seed=Date.now? Date.now()%2147483647 : 1;
function pseudo(){ _seed=(_seed*16807)%2147483647; return (_seed-1)/2147483646; }
function buildOpts(cur,units,field){
  const all=[]; units.forEach(u=>u.terms.forEach(t=>all.push(t)));
  const distract=shuffle(all.filter(t=>norm(t.ar)!==norm(cur.ar))).slice(0,3);
  return shuffle([cur,...distract]);
}

/* ---------- router ---------- */
function go(tab){
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab));
  if(tab==='plan')return renderPlan();
  if(tab==='diag')return renderDiag();
  if(tab==='woorden')return renderWoorden();
  if(tab==='motor')return renderMotor();
  if(tab==='grammatica')return renderGram();
  if(tab==='vervoeg')return renderVervoeg();
  if(tab==='spelling')return renderSpelling();
  if(tab==='quiz')return renderQuizMenu();
  if(tab==='train')return renderTrain();
}
document.querySelectorAll('nav button').forEach(b=>b.addEventListener('click',()=>go(b.dataset.tab)));
applyScale();
renderPlan();
</script>
